<!doctype html>
<html lang="es">
  <body style="margin:0;padding:0;background:#f4f7ff;font-family:Manrope,'Segoe UI',Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse;background:linear-gradient(180deg,#f4f7ff 0%,#ffffff 42%,#f8faff 100%);">
      <tr>
        <td style="padding:24px 16px 40px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;margin:0 auto;border-collapse:collapse;">
            <tr>
              <td style="padding:0 0 18px;border-top:4px solid #4f6ed8;">
                <img src="https://asi-do.netlify.app/brand/asi-logo-light.no-bg.png" alt="ASI Rep. Dominicana" width="160" style="display:block;width:160px;max-width:100%;height:auto;padding-top:18px;" />
              </td>
            </tr>
            <tr>
              <td style="border:1px solid #dfe7ff;border-radius:28px;background:#ffffff;box-shadow:0 24px 60px rgba(25,42,86,0.10);overflow:hidden;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="padding:36px 32px 18px;background:linear-gradient(180deg,rgba(244,247,255,0.96) 0%,rgba(255,255,255,0.98) 100%);">
                      <span style="display:inline-block;padding:8px 12px;border-radius:999px;background:#eef3ff;border:1px solid #dfe7ff;color:#4f6ed8;font-size:12px;line-height:1;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;">
                        Acceso seguro
                      </span>
                      <h1 style="margin:20px 0 0;font-size:38px;line-height:1.02;letter-spacing:-0.03em;color:#15203b;">
                        Ingresa con tu enlace magico
                      </h1>
                      <p style="margin:18px 0 0;font-size:16px;line-height:1.7;color:#586680;">
                        Usa este enlace unico para entrar a la plataforma de forma segura, sin escribir tu contrasena.
                      </p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:8px 32px 34px;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;min-width:220px;border-radius:18px;background:#4f6ed8;color:#ffffff;text-decoration:none;text-align:center;padding:16px 24px;font-size:14px;font-weight:700;letter-spacing:0.04em;">
                        Entrar a ASI
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
